name: 求人収集 (毎週日曜 21:00 JST)

on:
  schedule:
    # UTC 12:00 = JST 21:00、毎週日曜日
    - cron: "0 12 * * 0"
  # 手動実行も可能
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ─ リポジトリをチェックアウト
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─ Python 3.11 をセットアップ
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ─ Python 依存パッケージをインストール
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ─ Playwright (Chromium) をインストール
      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      # ─ Google 認証ファイルを Secret から復元
      #   Secret名: GOOGLE_CREDENTIALS_JSON (base64エンコードしたJSONを登録)
      #   登録方法: base64 credentials.json | pbcopy  →  GitHub Secrets に貼り付け
      - name: Restore credentials.json
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          echo "$GOOGLE_CREDENTIALS_JSON" | base64 --decode > credentials.json
          echo "credentials.json を復元しました"

      # ─ スクレイピング実行
      - name: Run scraper
        env:
          CREDENTIALS_FILE: credentials.json
        run: python main.py

      # ─ ログファイルをアーティファクトとして保存 (7日間)
      - name: Upload scraper log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-log-${{ github.run_id }}
          path: scraper.log
          retention-days: 7

      # ─ 認証ファイルを削除（後処理）
      - name: Clean up credentials
        if: always()
        run: rm -f credentials.json
